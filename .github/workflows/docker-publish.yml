name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [react-app, vue-app, angular-app, next-app, nuxt-app]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Nx Plugins
        run: npm i -D @nx/react @nx/vue @nx/angular @nx/next @nx/nuxt --no-audit --no-fund --legacy-peer-deps

      - name: Generate App
        run: ./generate.sh

      - name: Build App
        run: npx nx build ${{ matrix.app }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        run: |
          # The image tag uses "react", "vue" instead of "-app" for cleaner tag, but let's stick to literal mapping
          FRAMEWORK=$(echo "${{ matrix.app }}" | sed 's/-app//')
          IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/testapp-${FRAMEWORK}"
          
          docker build -t ${IMAGE_NAME}:latest -f Dockerfile.${{ matrix.app }} .
          docker push ${IMAGE_NAME}:latest
